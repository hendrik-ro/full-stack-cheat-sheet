<!DOCTYPE html>
<html>
 <head>
     <link href="../styles.css" rel="stylesheet">
 </head>
 <body>
 <header>
     <nav>
         <a href="../index.html" title="Content">Content</a>
         <a href="#css">CSS</a>
     </nav>
 </header>
 <div id="css">
     <h1>CSS</h1>
     <p>Cascading Style Sheets are used to specify the presentation and styling of a document written in a markup language such as HTML.</p>
     <div id="selectors">
         <h2>CSS selectors</h2>
         <h3>Anchor</h3>
         <table>
             <thead>
                 <th>Property</th>
                 <th>Code</th>
                 <th>Description</th>
             </thead>
             <tbody>
                 <tr>
                     <td><span class="code">color</span></td>
                     <td><code>a {color: blue;}</code></td>
                     <td>Sets foreground color of anchors to blue.</td>
                 </tr>
             </tbody>
         </table>
     </div>
 </div>
 </body>
</html>
